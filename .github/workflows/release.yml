name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            artifact: cloadex-darwin-amd64.tar.gz
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            artifact: cloadex-darwin-arm64.tar.gz
            archive: tar.gz
          - goos: linux
            goarch: amd64
            artifact: cloadex-linux-amd64.tar.gz
            archive: tar.gz
          - goos: linux
            goarch: arm64
            artifact: cloadex-linux-arm64.tar.gz
            archive: tar.gz
          - goos: windows
            goarch: amd64
            artifact: cloadex-windows-amd64.zip
            archive: zip
          - goos: windows
            goarch: arm64
            artifact: cloadex-windows-arm64.zip
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build artifact
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -ldflags "-X github.com/Ahmedlag/cloadex/cmd.version=${VERSION}" -o dist/cloadex.exe .
            cd dist
            zip -j "${{ matrix.artifact }}" cloadex.exe
          else
            go build -ldflags "-X github.com/Ahmedlag/cloadex/cmd.version=${VERSION}" -o dist/cloadex .
            tar -czf "dist/${{ matrix.artifact }}" -C dist cloadex
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
